<!DOCTYPE html>
<html lang="es">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Mi Primer Juego en Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<div class="layout-principal" id="layout-principal">

<div class="seccion-registro">
        <div class="contenedor-form">
            <h2>Crear Héroe</h2>
            <input type="text" id="reg-usuario" placeholder="Nuevo Usuario">
            <input type="email" id="reg-email" placeholder="Correo Electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button class="btn-registro" id="btn-registrar">Registrarse</button>
        </div>
    </div>

    <div class="seccion-login">
        <div id="contenedor-login">
            <h2>Entrar al Mundo</h2>
            <input type="text" id="input-usuario" placeholder="Usuario">
            <input type="password" id="input-pass" placeholder="Contraseña">
            <button id="btn-conectar">Conectar</button>
            <p id="error-login" style="color: red; display: none;"></p>
            <div style="text-align: center; padding-top: 10px;">
                <input type="text" id="input-ip" placeholder="localhost">
            </div>
        </div>

        <div class="spinner"></div>
        <p id="mensaje-carga">Conectando con el Reino de Java...</p>
    </div>

</div>
    <canvas id="juegoCanvas"></canvas>
    <script type="module" src="game.js"></script>
</body>
</html>
